<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elly CMS — Animasyonlu Sunum</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="animations.jsx"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { width: 100vw; height: 100vh; overflow: hidden; }
  body { background: #000; font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>
<div id="root" data-screen-label="0s"></div>
<script type="text/babel">

const W = 1920, H = 1080;
const FONT = "'DM Sans', sans-serif";
const MONO = "'DM Mono', monospace";

// Design tokens
const BG      = '#0d0e12';
const SURFACE = '#15171e';
const SURF2   = '#1c1e28';
const BORDER  = '#252736';
const TEXT    = '#e6e8f0';
const MUTED   = '#5a5e75';
const ACCENT  = 'oklch(68% 0.20 255)';
const ACCENT2 = 'oklch(68% 0.20 185)';
const ACCENT3 = 'oklch(68% 0.20 320)';
const RED_C   = 'oklch(65% 0.18 25)';

// ── Helpers ─────────────────────────────────────────────────────────────────
function tv(t, s, e, from, to, ease) {
  return animate({ from, to, start: s, end: e, ease: ease || Easing.easeInOutCubic })(t);
}

function withAlpha(color, a) {
  if (color.startsWith('#')) {
    const r = parseInt(color.slice(1,3),16);
    const g = parseInt(color.slice(3,5),16);
    const b = parseInt(color.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  // oklch(L C H) → oklch(L C H / a)
  return color.replace(')', ` / ${a})`);
}

// Fade scene in/out using sprite localTime
function useFadeOp(fadeDur) {
  const { localTime, duration } = useSprite();
  const d = fadeDur || 0.4;
  return Math.min(Math.min(1, localTime / d), Math.min(1, (duration - localTime) / d));
}

// Scene wrapper: dark BG + fade
function Scene({ children }) {
  const op = useFadeOp(0.4);
  return (
    <div style={{ position:'absolute', inset:0, opacity:op, fontFamily:FONT, color:TEXT }}>
      <div style={{ position:'absolute', inset:0, background:BG }} />
      {children}
    </div>
  );
}

// Small mono uppercase label
function EyeLabel({ text, color, appear }) {
  const { localTime } = useSprite();
  const a = appear || 0.3;
  return (
    <div style={{
      position:'absolute', left:'50%', top:62,
      transform:'translateX(-50%)',
      opacity: tv(localTime, a, a+0.5, 0, 1),
      fontFamily:MONO, fontSize:17, letterSpacing:4,
      textTransform:'uppercase', color: color||ACCENT, whiteSpace:'nowrap',
    }}>{text}</div>
  );
}

// Big slide title
function SlideTitle({ text, appear }) {
  const { localTime } = useSprite();
  const a = appear || 0.5;
  const op = tv(localTime, a, a+0.55, 0, 1);
  const ty = tv(localTime, a, a+0.55, 22, 0, Easing.easeOutCubic);
  return (
    <div style={{
      position:'absolute', left:'50%', top:100,
      transform:`translate(-50%, ${ty}px)`,
      opacity:op, fontSize:72, fontWeight:700, letterSpacing:-3,
      color:TEXT, whiteSpace:'nowrap',
    }}>{text}</div>
  );
}

// Animated SVG line
function ConnLine({ x1, y1, x2, y2, appear, drawDur, color, width }) {
  const { localTime } = useSprite();
  const a = appear||0; const dd = drawDur||0.5;
  const len = Math.hypot(x2-x1, y2-y1);
  const p = tv(localTime, a, a+dd, 0, 1);
  return (
    <line x1={x1} y1={y1} x2={x2} y2={y2}
      stroke={color||BORDER} strokeWidth={width||2}
      strokeDasharray={len} strokeDashoffset={len*(1-p)}
      strokeLinecap="round" />
  );
}

// Box node
function BoxNode({ cx, cy, w, h, label, sub, color, appear }) {
  const { localTime } = useSprite();
  const a = appear||0;
  const op = tv(localTime, a, a+0.5, 0, 1);
  const sc = tv(localTime, a, a+0.5, 0.8, 1, Easing.easeOutBack);
  const bw = w||220; const bh = h||85;
  return (
    <div style={{
      position:'absolute', left:cx-bw/2, top:cy-bh/2,
      width:bw, height:bh,
      background: withAlpha(color||ACCENT, 0.12),
      border:`1px solid ${withAlpha(color||ACCENT, 0.42)}`,
      borderRadius:14, display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', gap:5,
      opacity:op, transform:`scale(${sc})`, transformOrigin:'center',
    }}>
      <div style={{ fontFamily:MONO, fontSize:17, color:color||ACCENT, fontWeight:500, textAlign:'center', padding:'0 12px' }}>{label}</div>
      {sub && <div style={{ fontSize:14, color:MUTED, textAlign:'center', padding:'0 10px' }}>{sub}</div>}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// SCENE 1 · TITLE  (0–5s)
// ────────────────────────────────────────────────────────────────────────────
function SceneTitle() {
  const { localTime:lt } = useSprite();

  const glowOp = tv(lt, 0.1, 0.9, 0, 1);
  const glowSc = tv(lt, 0.1, 1.2, 0.2, 1.3, Easing.easeOutCubic);
  const titleOp = tv(lt, 0.4, 1.1, 0, 1);
  const titleY  = tv(lt, 0.4, 1.1, 55, 0, Easing.easeOutCubic);
  const subOp   = tv(lt, 1.4, 2.1, 0, 1);
  const eyeOp   = tv(lt, 0.2, 0.7, 0, 1);
  const badges  = ['Java 21','Spring Boot 3.5','PostgreSQL','Redis','Kubernetes'];

  return (
    <Scene>
      {/* Glow orb */}
      <div style={{
        position:'absolute', left:'50%', top:'44%',
        transform:`translate(-50%,-50%) scale(${glowSc})`,
        opacity:glowOp, width:800, height:800, borderRadius:'50%',
        background:'radial-gradient(circle, oklch(45% 0.20 255 / 0.20) 0%, transparent 70%)',
        pointerEvents:'none',
      }}/>

      {/* Eyebrow */}
      <div style={{
        position:'absolute', left:'50%', top:'27%',
        transform:'translateX(-50%)', opacity:eyeOp,
        fontFamily:MONO, fontSize:18, letterSpacing:5,
        textTransform:'uppercase', color:ACCENT, whiteSpace:'nowrap',
      }}>CMS Platformu · Spring Boot 3.5 · Java 21</div>

      {/* ELLY */}
      <div style={{
        position:'absolute', left:'50%', top:'44%',
        transform:`translate(-50%, calc(-50% + ${titleY}px))`,
        opacity:titleOp, fontSize:220, fontWeight:700, letterSpacing:-10,
        background:'linear-gradient(135deg, #ffffff 30%, oklch(78% 0.18 255))',
        WebkitBackgroundClip:'text', backgroundClip:'text', WebkitTextFillColor:'transparent',
        lineHeight:0.9, fontFamily:FONT,
      }}>Elly</div>

      {/* Subtitle */}
      <div style={{
        position:'absolute', left:'50%', top:'66%',
        transform:'translateX(-50%)', opacity:subOp,
        fontSize:30, fontWeight:300, color:MUTED, whiteSpace:'nowrap', letterSpacing:-0.5,
      }}>Güçlü Çok Kiracılı İçerik Yönetim Sistemi</div>

      {/* Badges */}
      <div style={{
        position:'absolute', left:'50%', top:'78%',
        transform:'translateX(-50%)', display:'flex', gap:14,
      }}>
        {badges.map((b,i) => {
          const bOp = tv(lt, 2.1+i*0.22, 2.7+i*0.22, 0, 1);
          const bSc = tv(lt, 2.1+i*0.22, 2.7+i*0.22, 0.65, 1, Easing.easeOutBack);
          return (
            <div key={b} style={{
              padding:'10px 22px', background:withAlpha(ACCENT,0.12),
              border:`1px solid ${withAlpha(ACCENT,0.35)}`,
              borderRadius:10, fontFamily:MONO, fontSize:17, color:TEXT,
              opacity:bOp, transform:`scale(${bSc})`, whiteSpace:'nowrap',
            }}>{b}</div>
          );
        })}
      </div>
    </Scene>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// SCENE 2 · ENTITIES  (5–13s)
// ────────────────────────────────────────────────────────────────────────────
function SceneEntities() {
  const { localTime:lt } = useSprite();

  // Four pillars layout
  const pillars = [
    { label:'İçerik', color:ACCENT,  a:0.7, items:['Page','Component','Banner','Widget','Post','Comment','Rating'] },
    { label:'Auth',   color:ACCENT2, a:1.4, items:['User','Role','Permission','Login','Register','RefreshToken','OAuth2'] },
    { label:'Form',   color:ACCENT3, a:2.1, items:['FormDefinition','FieldDefinition','ConditionEvaluator','FormSubmission'] },
    { label:'E-posta',color:ACCENT,  a:2.8, items:['MailAccount','EmailLog','RabbitMQ queue','Thymeleaf','EmailRescueJob'] },
  ];

  const PW = 380, PX0 = 120, GAP = 430;

  return (
    <Scene>
      <EyeLabel text="Genel Bakış" />
      <SlideTitle text="Elly Nedir? — Dört Temel" />

      {pillars.map((p, pi) => {
        const x = PX0 + pi * GAP;
        const op = tv(lt, p.a, p.a+0.55, 0, 1);
        const ty = tv(lt, p.a, p.a+0.55, 30, 0, Easing.easeOutBack);
        return (
          <div key={p.label} style={{
            position:'absolute', left:x, top:200, width:PW,
            opacity:op, transform:`translateY(${ty}px)`,
            display:'flex', flexDirection:'column', gap:12,
          }}>
            <div style={{
              background:withAlpha(p.color,0.14),
              border:`1px solid ${withAlpha(p.color,0.45)}`,
              borderRadius:14, padding:'14px 20px',
              fontFamily:MONO, fontSize:22, color:p.color, fontWeight:600,
            }}>{p.label}</div>
            {p.items.map((item, ii) => {
              const ia = p.a + 0.3 + ii*0.12;
              return (
                <div key={item} style={{
                  opacity: tv(lt, ia, ia+0.4, 0, 1),
                  transform:`translateX(${tv(lt, ia, ia+0.4, 18, 0, Easing.easeOutCubic)}px)`,
                  background:SURFACE, border:`1px solid ${BORDER}`,
                  borderRadius:9, padding:'10px 18px',
                  fontFamily:MONO, fontSize:18, color:TEXT,
                }}>{item}</div>
              );
            })}
          </div>
        );
      })}

      {/* Bottom tagline */}
      <div style={{
        position:'absolute', left:'50%', bottom:60,
        transform:'translateX(-50%)',
        opacity: tv(lt, 5.0, 5.7, 0, 1),
        fontSize:22, color:MUTED, fontFamily:MONO, letterSpacing:1, whiteSpace:'nowrap',
      }}>Hızlı MVP · Multi-Tenant · Üretime Hazır</div>
    </Scene>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// SCENE 2b · AUTH ARCHITECTURE  (13–21s)
// ────────────────────────────────────────────────────────────────────────────
function SceneAuth() {
  const { localTime:lt } = useSprite();

  const loginSteps = [
    { label:'POST /api/auth/login', sub:'AdminLoginInterceptor · TenantLoginInterceptor', color:ACCENT,  a:0.8 },
    { label:'JWT Üretimi',          sub:'Access + Refresh · loginSource + tenantId claim', color:ACCENT,  a:1.6 },
    { label:'POST /api/auth/refresh', sub:'RefreshToken doğrulama · revoke kontrolü · yeni token', color:ACCENT, a:2.4 },
  ];
  const oauthSteps = [
    { label:'POST /api/auth/register', sub:'User oluştur · Rol ata · RabbitMQ doğrulama maili', color:ACCENT2, a:0.8 },
    { label:'OAuth2 Providers',        sub:'Google · Facebook · GitHub → SuccessHandler → JWT', color:ACCENT2, a:1.6 },
    { label:'Redis Auth Cache',        sub:'auth:user:{username} · TTL 30dk · 3 SQL → 1 Redis GET', color:ACCENT2, a:2.4 },
  ];

  const SW = 760, SH = 110;
  const lx = 120, rx = 1020;

  return (
    <Scene>
      <EyeLabel text="Kimlik & Erişim" />
      <SlideTitle text="Auth Mimarisi" />

      {/* Login column */}
      {loginSteps.map((s, i) => {
        const op = tv(lt, s.a, s.a+0.5, 0, 1);
        const tx = tv(lt, s.a, s.a+0.5, -40, 0, Easing.easeOutCubic);
        return (
          <div key={i}>
            <div style={{
              position:'absolute', left:lx, top:230+i*190, width:SW, height:SH,
              opacity:op, transform:`translateX(${tx}px)`,
              background:withAlpha(s.color,0.10), border:`1px solid ${withAlpha(s.color,0.4)}`,
              borderRadius:13, padding:'18px 24px',
            }}>
              <div style={{ fontFamily:MONO, fontSize:20, color:s.color, fontWeight:600, marginBottom:8 }}>{s.label}</div>
              <div style={{ fontSize:18, color:MUTED }}>{s.sub}</div>
            </div>
            {i < loginSteps.length-1 && (
              <div style={{ position:'absolute', left:lx+SW/2-1, top:230+i*190+SH, width:2, height:80,
                background:`linear-gradient(180deg, ${s.color}, transparent)`,
                opacity:tv(lt, s.a+0.4, s.a+0.7, 0, 1) }} />
            )}
          </div>
        );
      })}

      {/* OAuth column */}
      {oauthSteps.map((s, i) => {
        const op = tv(lt, s.a, s.a+0.5, 0, 1);
        const tx = tv(lt, s.a, s.a+0.5, 40, 0, Easing.easeOutCubic);
        return (
          <div key={i}>
            <div style={{
              position:'absolute', left:rx, top:230+i*190, width:SW, height:SH,
              opacity:op, transform:`translateX(${tx}px)`,
              background:withAlpha(s.color,0.10), border:`1px solid ${withAlpha(s.color,0.4)}`,
              borderRadius:13, padding:'18px 24px',
            }}>
              <div style={{ fontFamily:MONO, fontSize:20, color:s.color, fontWeight:600, marginBottom:8 }}>{s.label}</div>
              <div style={{ fontSize:18, color:MUTED }}>{s.sub}</div>
            </div>
            {i < oauthSteps.length-1 && (
              <div style={{ position:'absolute', left:rx+SW/2-1, top:230+i*190+SH, width:2, height:80,
                background:`linear-gradient(180deg, ${s.color}, transparent)`,
                opacity:tv(lt, s.a+0.4, s.a+0.7, 0, 1) }} />
            )}
          </div>
        );
      })}

      {/* RefreshToken table */}
      <div style={{
        position:'absolute', left:'50%', bottom:70,
        transform:'translateX(-50%)',
        opacity:tv(lt, 4.5, 5.2, 0, 1),
        display:'flex', gap:32, alignItems:'center',
        fontFamily:MONO, fontSize:18, color:MUTED,
      }}>
        {['token: UUID','expiryDate: LocalDateTime','revoked: Boolean','user: ManyToOne'].map(f => (
          <div key={f} style={{ padding:'8px 18px', background:SURFACE, border:`1px solid ${BORDER}`, borderRadius:8, color:TEXT }}>{f}</div>
        ))}
      </div>
    </Scene>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// SCENE 2c · FORM SYSTEM  (21–29s)
// ────────────────────────────────────────────────────────────────────────────
function SceneForm() {
  const { localTime:lt } = useSprite();

  const schemaFields = [
    { k:'id',      v:'UUID · Primary Key',                      a:0.9 },
    { k:'version', v:'Integer · şema versiyonlama',             a:1.2 },
    { k:'schema',  v:'JSONB → FormSchema (fields + config)',     a:1.5 },
    { k:'active',  v:'Boolean · yayın durumu',                  a:1.8 },
  ];
  const fieldDef = [
    { k:'type',       v:'text · select · number',               a:2.3 },
    { k:'required',   v:'Boolean',                              a:2.5 },
    { k:'validation', v:'min · max · regex pattern',            a:2.7 },
    { k:'condition',  v:'field · operator · value',             a:2.9 },
  ];
  const validators = [
    { label:'TextFieldValidator',   desc:'min/max uzunluk, regex', color:ACCENT3, a:3.5 },
    { label:'NumberFieldValidator', desc:'aralık, tam sayı kontrolü', color:ACCENT3, a:3.9 },
    { label:'SelectFieldValidator', desc:'izin verilen değerler',  color:ACCENT3, a:4.3 },
  ];
  const flow = ['FormDefinition çek','Alanları iterate et','ConditionEvaluator','FieldValidator çalıştır','FormSubmission kaydet (JSONB)'];

  return (
    <Scene>
      <EyeLabel text="Şema Güdümlü UI" />
      <SlideTitle text="Form & Dinamik Alanlar" />

      {/* FormDefinition */}
      <div style={{ position:'absolute', left:100, top:220, width:500 }}>
        <div style={{ fontFamily:MONO, fontSize:16, color:MUTED, letterSpacing:2, textTransform:'uppercase', marginBottom:12, opacity:tv(lt,0.7,1.1,0,1) }}>FormDefinition</div>
        {schemaFields.map(f => (
          <div key={f.k} style={{ display:'flex', gap:16, marginBottom:10, opacity:tv(lt,f.a,f.a+0.4,0,1), transform:`translateX(${tv(lt,f.a,f.a+0.4,-20,0,Easing.easeOutCubic)}px)` }}>
            <div style={{ fontFamily:MONO, fontSize:19, color:ACCENT, width:110, flexShrink:0 }}>{f.k}</div>
            <div style={{ fontSize:18, color:MUTED }}>{f.v}</div>
          </div>
        ))}
        <div style={{ margin:'20px 0 12px', fontFamily:MONO, fontSize:16, color:MUTED, letterSpacing:2, textTransform:'uppercase', opacity:tv(lt,2.0,2.4,0,1) }}>FieldDefinition</div>
        {fieldDef.map(f => (
          <div key={f.k} style={{ display:'flex', gap:16, marginBottom:10, opacity:tv(lt,f.a,f.a+0.4,0,1), transform:`translateX(${tv(lt,f.a,f.a+0.4,-20,0,Easing.easeOutCubic)}px)` }}>
            <div style={{ fontFamily:MONO, fontSize:19, color:ACCENT2, width:110, flexShrink:0 }}>{f.k}</div>
            <div style={{ fontSize:18, color:MUTED }}>{f.v}</div>
          </div>
        ))}
      </div>

      {/* Validators */}
      <div style={{ position:'absolute', left:700, top:220, width:520 }}>
        <div style={{ fontFamily:MONO, fontSize:16, color:MUTED, letterSpacing:2, textTransform:'uppercase', marginBottom:16, opacity:tv(lt,3.2,3.6,0,1) }}>Strateji Deseni</div>
        {validators.map(v => (
          <div key={v.label} style={{
            marginBottom:14, opacity:tv(lt,v.a,v.a+0.5,0,1),
            transform:`translateY(${tv(lt,v.a,v.a+0.5,16,0,Easing.easeOutBack)}px)`,
            background:withAlpha(v.color,0.10), border:`1px solid ${withAlpha(v.color,0.35)}`,
            borderRadius:10, padding:'14px 20px',
          }}>
            <div style={{ fontFamily:MONO, fontSize:19, color:v.color, fontWeight:600 }}>{v.label}</div>
            <div style={{ fontSize:17, color:MUTED, marginTop:5 }}>{v.desc}</div>
          </div>
        ))}
      </div>

      {/* Submit flow */}
      <div style={{ position:'absolute', left:1320, top:220, width:480 }}>
        <div style={{ fontFamily:MONO, fontSize:16, color:MUTED, letterSpacing:2, textTransform:'uppercase', marginBottom:16, opacity:tv(lt,4.8,5.2,0,1) }}>Gönderim Akışı</div>
        {flow.map((s,i) => (
          <div key={i} style={{ opacity:tv(lt,5.0+i*0.3,5.5+i*0.3,0,1) }}>
            <div style={{
              background:SURFACE, border:`1px solid ${BORDER}`,
              borderRadius:9, padding:'12px 18px',
              fontFamily:MONO, fontSize:17, color:TEXT, marginBottom:4,
            }}>{i+1}. {s}</div>
            {i < flow.length-1 && <div style={{ textAlign:'center', color:ACCENT, fontSize:18, marginBottom:4 }}>↓</div>}
          </div>
        ))}
      </div>
    </Scene>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// SCENE 2d · EMAIL SYSTEM  (29–37s)
// ────────────────────────────────────────────────────────────────────────────
function SceneEmail() {
  const { localTime:lt } = useSprite();

  const flowSteps = [
    { label:'POST /api/v1/emails/send', sub:'JWT korumalı · @PreAuthorize', color:ACCENT,  a:0.7  },
    { label:'EmailLog PENDING',         sub:'DB\'ye kaydedilir · 202 Accepted döner', color:ACCENT,  a:1.5  },
    { label:'RabbitMQ email-queue',     sub:'Sadece emailLogId yayınlanır', color:ACCENT2, a:2.3  },
    { label:'Consumer',                 sub:'Log çek → Thymeleaf render → TenantMailSenderFactory', color:ACCENT2, a:3.1 },
    { label:'Gmail SMTP',               sub:'Kiracının AES-256 şifreli SMTP bilgileri', color:ACCENT3, a:3.9 },
    { label:'Retry / DLQ',              sub:'max 3× · TTL 30sn → FAILED + Dead Letter Queue', color:RED_C,   a:4.7 },
  ];

  const FW = 270, FH = 110, totalW = flowSteps.length*(FW+40) - 40;
  const startX = (W - totalW) / 2;

  return (
    <Scene>
      <EyeLabel text="Asenkron Mesajlaşma" />
      <SlideTitle text="E-posta Sistemi" />

      {/* Flow diagram */}
      <svg style={{ position:'absolute', inset:0, width:W, height:H, pointerEvents:'none' }}>
        {flowSteps.slice(0,-1).map((s, i) => {
          const x1 = startX + i*(FW+40) + FW;
          const x2 = startX + (i+1)*(FW+40);
          const my = 360 + FH/2;
          return <ConnLine key={i} x1={x1} y1={my} x2={x2} y2={my} appear={s.a+0.3} color={flowSteps[i+1].color} drawDur={0.4}/>;
        })}
      </svg>

      {flowSteps.map((s, i) => {
        const bx = startX + i*(FW+40);
        const op = tv(lt, s.a, s.a+0.5, 0, 1);
        const ty2 = tv(lt, s.a, s.a+0.5, 20, 0, Easing.easeOutBack);
        return (
          <div key={i} style={{
            position:'absolute', left:bx, top:360, width:FW, height:FH,
            opacity:op, transform:`translateY(${ty2}px)`,
            background:withAlpha(s.color,0.12), border:`1px solid ${withAlpha(s.color,0.42)}`,
            borderRadius:12, padding:'14px 16px',
            display:'flex', flexDirection:'column', gap:6,
          }}>
            <div style={{ fontFamily:MONO, fontSize:16, color:s.color, fontWeight:600 }}>{s.label}</div>
            <div style={{ fontSize:14, color:MUTED, lineHeight:1.4 }}>{s.sub}</div>
